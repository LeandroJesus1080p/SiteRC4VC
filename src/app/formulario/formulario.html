<section id="formulario" class="max-w-6xl mx-auto py-12 px-4 md:px-8">
    <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-10 tracking-tight leading-tight">
        Entre em contato
    </h2>

    <form class="space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-14">

            <!-- Coluna Esquerda: Inputs -->
            <div class="flex flex-col h-full gap-5">
                <input type="text" placeholder="seu nome"
                    class="w-full px-4 py-3.5 border border-[#cf9374] rounded focus:outline-none focus:border-[#f05a10] focus:ring-1 focus:ring-[#f05a10] text-gray-700 bg-transparent placeholder-gray-500 transition-all font-medium">

                <input type="email" placeholder="seu e-mail"
                    class="w-full px-4 py-3.5 border border-[#cf9374] rounded focus:outline-none focus:border-[#f05a10] focus:ring-1 focus:ring-[#f05a10] text-gray-700 bg-transparent placeholder-gray-500 transition-all font-medium">

                <input type="tel" placeholder="tel/whatsapp"
                    class="w-full px-4 py-3.5 border border-[#cf9374] rounded focus:outline-none focus:border-[#f05a10] focus:ring-1 focus:ring-[#f05a10] text-gray-700 bg-transparent placeholder-gray-500 transition-all font-medium">

                <textarea placeholder="digite sua mensagem"
                    class="w-full px-4 py-3.5 border border-[#cf9374] rounded focus:outline-none focus:border-[#f05a10] focus:ring-1 focus:ring-[#f05a10] text-gray-700 bg-transparent placeholder-gray-500 resize-none flex-grow min-h-[160px] transition-all font-medium"></textarea>
            </div>

            <div class="flex flex-col h-full gap-5">

                <!-- Box 1 -->
                <div class="border border-[#cf9374] p-6 lg:p-7 rounded flex-grow">
                    <h3 class="text-[#009b9f] text-[1.4rem] font-medium mb-6">Quem é você?</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-2 gap-y-5">
                        <label class="flex items-start gap-3.5 text-gray-600 cursor-pointer group">
                            <input type="checkbox"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] mt-[3px] cursor-pointer transition-all">
                            <span
                                class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors leading-[1.3]">Corretor
                                pessoal física</span>
                        </label>
                        <label class="flex items-start gap-3.5 text-gray-600 cursor-pointer group">
                            <input type="checkbox"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] mt-[3px] cursor-pointer transition-all">
                            <span
                                class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors leading-[1.3]">Escritório
                                de investimentos</span>
                        </label>
                        <label class="flex items-start gap-3.5 text-gray-600 cursor-pointer group">
                            <input type="checkbox"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] mt-[3px] cursor-pointer transition-all">
                            <span
                                class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors leading-[1.3]">Corretor
                                pessoal jurídica</span>
                        </label>
                        <label class="flex items-start gap-3.5 text-gray-600 cursor-pointer group">
                            <input type="checkbox"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] mt-[3px] cursor-pointer transition-all">
                            <span
                                class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors leading-[1.3]">Corretora
                                de valores</span>
                        </label>
                        <label class="flex items-start gap-3.5 text-gray-600 cursor-pointer group">
                            <input type="checkbox"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] mt-[3px] cursor-pointer transition-all">
                            <span
                                class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors leading-[1.3]">Consultor
                                financeiro</span>
                        </label>
                        <label class="flex items-start gap-3.5 text-gray-600 cursor-pointer group">
                            <input type="checkbox"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] mt-[3px] cursor-pointer transition-all">
                            <span
                                class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors leading-[1.3]">Associação/Entidade
                                de classe</span>
                        </label>
                    </div>
                </div>

                <!-- Box 2 -->
                <div class="border border-[#cf9374] p-6 lg:p-7 rounded">
                    <h3 class="text-[#009b9f] text-[1.4rem] font-medium mb-5">Você possui habilitação na Susep?</h3>
                    <div class="flex flex-wrap gap-y-4 gap-x-6 sm:justify-between">
                        <label class="flex items-center gap-2.5 text-gray-600 cursor-pointer group">
                            <input type="radio" name="susep"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] cursor-pointer transition-all">
                            <span class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors">Susep
                                Plena</span>
                        </label>
                        <label class="flex items-center gap-2.5 text-gray-600 cursor-pointer group">
                            <input type="radio" name="susep"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] cursor-pointer transition-all">
                            <span
                                class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors">Susepinha</span>
                        </label>
                        <label class="flex items-center gap-2.5 text-gray-600 cursor-pointer group">
                            <input type="radio" name="susep"
                                class="accent-[#f05a10] shrink-0 w-[18px] h-[18px] cursor-pointer transition-all">
                            <span class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors">Não
                                possui</span>
                        </label>
                    </div>
                </div>

            </div>
        </div>

        <!-- Termos de uso e Botão -->
        <div class="pt-4 flex flex-col items-start gap-8">
            <label class="flex items-start gap-4 text-gray-600 cursor-pointer group pl-1">
                <input type="checkbox" required #chkTermos [checked]="termosAceitos"
                    (change)="termosAceitos = chkTermos.checked"
                    class="accent-[#f05a10] shrink-0 w-[20px] h-[20px] mt-[2px] cursor-pointer transition-all">
                <span class="text-[1.05rem] font-medium group-hover:text-gray-900 transition-colors leading-[1.4]">
                    Autorizo o processamento de meus dados pessoais na plataforma RC4VC e aceito os
                    <button type="button" (click)="mostrarTermos = true"
                        class="text-[#f05a10] hover:underline hover:text-[#007a7d] font-bold cursor-pointer">termos de
                        uso</button>.
                </span>
            </label>

            <button type="submit"
                class="bg-[#ff6a13] hover:bg-[#e05a0d] text-white font-extrabold text-[1.4rem] tracking-wide py-3.5 px-16 rounded-xl transition-all duration-300 shadow-[0_5px_15px_rgba(255,106,19,0.3)] hover:-translate-y-1 hover:shadow-[0_8px_20px_rgba(255,106,19,0.4)]">
                enviar
            </button>
        </div>
    </form>
</section>

<!-- Modal de Termos de Uso -->
@if (mostrarTermos) {
<app-termos-uso (fechou)="mostrarTermos = false" (aceitou)="aceitarTermos()"></app-termos-uso>
}
